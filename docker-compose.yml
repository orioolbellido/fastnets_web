version: "3.9"

services:
  fastnets:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastnets_web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: reverse proxy for production
  # nginx:
  #   image: nginx:alpine
